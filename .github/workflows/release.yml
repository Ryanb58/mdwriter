name: Release

on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: 'Release notes (markdown). Leave blank for autogenerated.'
        required: false
        default: ''

env:
  NODE_OPTIONS: --max-old-space-size=4096
  # Opt in to Node 24 for JS actions (actions/checkout@v4 etc.) so the
  # Node-20 deprecation warning goes away. The default flips to Node 24
  # on 2026-06-02 anyway.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

# Workflow-level permissions ceiling. If the repo's default workflow
# permissions are "Read-only," this declaration cannot raise above that —
# the repo setting must be "Read and write permissions" for tag pushes
# and release creation to work.
permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ──────────────────────────────────────────────────────────────
  # Job 1: Create the release tag from today's date + current short SHA.
  # Tag form: vYYYY-MM-DD.<short-sha>; version YYYY.M.D (no leading zeros).
  # ──────────────────────────────────────────────────────────────
  tag:
    name: Create release tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.compute.outputs.tag }}
      version: ${{ steps.compute.outputs.version }}
      sha: ${{ steps.compute.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute tag and version
        id: compute
        shell: bash
        run: |
          set -euo pipefail
          SHORT_SHA=$(git rev-parse --short HEAD)
          DATE=$(date -u +%Y-%m-%d)
          TAG="v${DATE}.${SHORT_SHA}"
          VERSION=$(echo "$DATE" | awk -F- '{printf "%d.%d.%d", $1, $2, $3}')

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "::error::Tag $TAG already exists. If a release was already cut today from this commit, push a new commit before running again."
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          {
            echo "### Cutting release"
            echo ""
            echo "- Tag: \`$TAG\`"
            echo "- Version: \`$VERSION\`"
            echo "- Source SHA: \`$SHORT_SHA\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create tag via GitHub API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.compute.outputs.tag }}
        run: |
          set -euo pipefail
          # Use the refs API instead of `git push`. Avoids the auth quirks
          # of the credential helper when pushing to protected branches /
          # tag patterns; the token's contents:write permission is enough.
          gh api -X POST "/repos/${GITHUB_REPOSITORY}/git/refs" \
            -f "ref=refs/tags/${TAG}" \
            -f "sha=${GITHUB_SHA}"

      - name: Create draft GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.compute.outputs.tag }}
          VERSION: ${{ steps.compute.outputs.version }}
          NOTES: ${{ inputs.release_notes }}
        run: |
          set -euo pipefail
          # Create the draft release ONCE here so the four parallel build
          # jobs just attach artifacts to it instead of racing to create it.
          BODY=$(cat <<EOF
          ${NOTES}

          ---

          **macOS (unsigned):** on first launch, click **Done** on the "could not verify" warning, then go to **System Settings → Privacy & Security**, scroll to *"mdwriter.app was blocked"*, and click **Open Anyway**. (On macOS 14 and earlier, right-click → **Open** also works.)
          **Windows (unsigned):** click "More info → Run anyway" on SmartScreen.
          EOF
          )
          gh release create "$TAG" \
            --draft \
            --title "mdwriter ${VERSION} (${TAG})" \
            --notes "$BODY"

  # ──────────────────────────────────────────────────────────────
  # Job 2: Build per-platform bundles in parallel and upload them
  # to a draft GitHub release.
  # ──────────────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.os }} ${{ matrix.arch }})
    needs: tag
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            arch: aarch64
            target: aarch64-apple-darwin
            bundles: app,dmg,updater
          - os: macos-15
            arch: x86_64
            target: x86_64-apple-darwin
            bundles: app,dmg,updater
          - os: windows-latest
            arch: x86_64
            target: x86_64-pc-windows-msvc
            # Skip MSI — MSI's version major is limited to u8 (0-255), and
            # our YYYY.M.D versioning would always blow that out. NSIS has
            # no such limit and is the .exe form the updater manifest
            # already references.
            bundles: nsis,updater
          - os: ubuntu-latest
            arch: x86_64
            target: x86_64-unknown-linux-gnu
            bundles: deb,rpm,appimage,updater
    steps:
      - name: Checkout the tagged commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.tag.outputs.tag }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.target }}-

      - name: Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            patchelf

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Stamp version into manifests
        shell: bash
        run: |
          VERSION="${{ needs.tag.outputs.version }}"
          # tauri.conf.json
          node -e "const fs=require('fs');const p='src-tauri/tauri.conf.json';const j=JSON.parse(fs.readFileSync(p));j.version='${VERSION}';fs.writeFileSync(p,JSON.stringify(j,null,2)+'\n');"
          # Cargo.toml
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            sed -i '' "s/^version = \".*\"/version = \"${VERSION}\"/" src-tauri/Cargo.toml
          else
            sed -i "s/^version = \".*\"/version = \"${VERSION}\"/" src-tauri/Cargo.toml
          fi
          # package.json
          node -e "const fs=require('fs');const p='package.json';const j=JSON.parse(fs.readFileSync(p));j.version='${VERSION}';fs.writeFileSync(p,JSON.stringify(j,null,2)+'\n');"

      - name: Build with tauri-action
        uses: tauri-apps/tauri-action@v0
        env:
          # Required for tauri-action to upload bundles to the GitHub release.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GitHub doesn't allow empty-string secrets, so the password secret
          # may not exist. Tauri treats empty/missing as "key has no password."
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD || '' }}
          # Ad-hoc codesign on macOS so future auto-updates don't re-trigger
          # Gatekeeper. "-" is the ad-hoc identity; no Apple Developer ID needed.
          APPLE_SIGNING_IDENTITY: ${{ runner.os == 'macOS' && '-' || '' }}
        with:
          tagName: ${{ needs.tag.outputs.tag }}
          releaseName: 'mdwriter ${{ needs.tag.outputs.version }} (${{ needs.tag.outputs.tag }})'
          releaseBody: |
            ${{ inputs.release_notes }}

            ---

            **macOS (unsigned):** on first launch, click **Done** on the "could not verify" warning, then go to **System Settings → Privacy & Security**, scroll to *"mdwriter.app was blocked"*, and click **Open Anyway**. (On macOS 14 and earlier, right-click → **Open** also works.)
            **Windows (unsigned):** click "More info → Run anyway" on SmartScreen.
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      # Tauri's bundle naming on macOS is uneven:
      #   .app.tar.gz / .sig  →  mdwriter_${SUFFIX}.app.tar.gz      (no version!)
      #   .dmg                →  mdwriter_${VERSION}_${SUFFIX}.dmg  (with version)
      # And the suffix is `aarch64` for arm64 but `x64` (not `x86_64`) for Intel.
      # Rename everything to the friendlier macOS_Silicon / macOS_Intel labels
      # WITH version, so multiple releases coexist cleanly on the download host.
      - name: Rename macOS release assets
        if: runner.os == 'macOS'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.tag.outputs.tag }}
          VERSION: ${{ needs.tag.outputs.version }}
          ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail
          case "$ARCH" in
            aarch64) SUFFIX="aarch64"; FRIENDLY="macOS_Silicon" ;;
            x86_64)  SUFFIX="x64";     FRIENDLY="macOS_Intel"   ;;
            *)       SUFFIX="$ARCH";   FRIENDLY="$ARCH"          ;;
          esac

          # (old name, new name) pairs.
          declare -a PAIRS=(
            "mdwriter_${SUFFIX}.app.tar.gz"           "mdwriter_${VERSION}_${FRIENDLY}.app.tar.gz"
            "mdwriter_${SUFFIX}.app.tar.gz.sig"       "mdwriter_${VERSION}_${FRIENDLY}.app.tar.gz.sig"
            "mdwriter_${VERSION}_${SUFFIX}.dmg"       "mdwriter_${VERSION}_${FRIENDLY}.dmg"
          )

          # GET /releases/tags/{tag} does NOT return draft releases (it 404s).
          # The release is still a draft at this point — promotion happens in
          # publish-manifest after every platform finishes. Use the list
          # endpoint instead, which includes drafts. The release we just
          # created is the most recent, so the default first page is enough.
          RELEASE_ID=$(gh api "/repos/${GITHUB_REPOSITORY}/releases?per_page=100" \
            --jq "first(.[] | select(.tag_name == \"${TAG}\") | .id) // empty")
          if [[ -z "$RELEASE_ID" ]]; then
            echo "::error::Release for tag ${TAG} not found (drafts included)"
            exit 1
          fi

          # Fetch assets once. Looking them up per-pair would re-query the API
          # three times for the same release.
          ASSETS_JSON=$(gh api "/repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}" --jq '.assets')

          MISSING=0
          for ((i=0; i<${#PAIRS[@]}; i+=2)); do
            OLD="${PAIRS[i]}"
            NEW="${PAIRS[i+1]}"
            ASSET_ID=$(jq -r --arg name "$OLD" '.[] | select(.name == $name) | .id' <<<"$ASSETS_JSON")
            if [[ -n "$ASSET_ID" && "$ASSET_ID" != "null" ]]; then
              gh api -X PATCH "/repos/${GITHUB_REPOSITORY}/releases/assets/${ASSET_ID}" \
                -f "name=${NEW}" >/dev/null
              echo "Renamed: $OLD -> $NEW"
            else
              echo "::error::Expected asset '$OLD' not found on release ${TAG}"
              MISSING=1
            fi
          done
          if [[ $MISSING -ne 0 ]]; then
            exit 1
          fi

      - name: Upload signature artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sigs-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.sig
          if-no-files-found: warn

  # ──────────────────────────────────────────────────────────────
  # Job 3: Generate latest.json from the .sig files and publish it
  # to the gh-pages branch under /updates/. Only runs after every
  # platform build succeeds — so a partial release never silently
  # rolls users to a half-broken update.
  # Then flips the GitHub release from draft → published, which is
  # what makes the asset URLs in latest.json resolve.
  # ──────────────────────────────────────────────────────────────
  publish-manifest:
    name: Publish update manifest and release
    needs: [tag, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.tag.outputs.tag }}

      - name: Download all signature artifacts
        uses: actions/download-artifact@v4
        with:
          path: sigs

      - name: Generate latest.json
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.tag.outputs.version }}"
          TAG="${{ needs.tag.outputs.tag }}"
          # Downloads are mirrored to taylorbrazelton.com/mdwriter/ rather than
          # served from the GitHub release directly. The release-asset filenames
          # (after the rename step above) match exactly, so the mirror just
          # needs to host the same names. The updater manifest itself is still
          # published to gh-pages — only the binaries move.
          BASE="https://taylorbrazelton.com/mdwriter"
          PUBDATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          # Search by artifact name (which encodes the platform) rather than
          # by .sig filename. macOS .sig files are named mdwriter.app.tar.gz.sig
          # with no arch or version in the name — only the artifact directory
          # tells us which arch they belong to.
          read_sig() {
            local artifact_dir="$1" pattern="$2"
            local file
            file=$(find "sigs/$artifact_dir" -type f -name "$pattern" 2>/dev/null | head -1 || true)
            if [[ -z "$file" ]]; then echo ""; return; fi
            cat "$file"
          }

          ls -laR sigs || true   # debug: log what we got

          MAC_ARM_SIG=$(read_sig "sigs-macos-15-aarch64"      "*.app.tar.gz.sig")
          MAC_X64_SIG=$(read_sig "sigs-macos-15-x86_64"       "*.app.tar.gz.sig")
          WIN_SIG=$(read_sig     "sigs-windows-latest-x86_64" "*-setup.exe.sig")

          mkdir -p out
          {
            echo '{'
            echo "  \"version\": \"${VERSION}\","
            echo "  \"notes\": \"See https://github.com/${GITHUB_REPOSITORY}/releases/tag/${TAG} for the full changelog.\","
            echo "  \"pub_date\": \"${PUBDATE}\","
            echo '  "platforms": {'
            FIRST=1
            emit() {
              local key="$1" sig="$2" url="$3"
              if [[ -z "$sig" ]]; then return; fi
              if [[ $FIRST -eq 0 ]]; then echo ','; fi
              FIRST=0
              printf '    "%s": {\n      "signature": %s,\n      "url": "%s"\n    }' "$key" "$(jq -Rs <<< "$sig")" "$url"
            }
            emit "darwin-aarch64" "$MAC_ARM_SIG" "${BASE}/mdwriter_${VERSION}_macOS_Silicon.app.tar.gz"
            emit "darwin-x86_64"  "$MAC_X64_SIG" "${BASE}/mdwriter_${VERSION}_macOS_Intel.app.tar.gz"
            emit "windows-x86_64" "$WIN_SIG"     "${BASE}/mdwriter_${VERSION}_x64-setup.exe"
            echo
            echo '  }'
            echo '}'
          } > out/latest.json
          cat out/latest.json

      # Promote the draft release first, so its asset URLs resolve
      # before installed apps fetch latest.json and try to download.
      - name: Promote draft release to published
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ needs.tag.outputs.tag }}" --draft=false

      - name: Publish manifest to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: out
          destination_dir: updates
          keep_files: true
          commit_message: 'Publish mdwriter ${{ needs.tag.outputs.version }} manifest'

      - name: Summary
        run: |
          {
            echo "### Release published"
            echo ""
            echo "- GitHub Release: https://github.com/${GITHUB_REPOSITORY}/releases/tag/${{ needs.tag.outputs.tag }}"
            echo "- Update manifest: https://ryanb58.github.io/mdwriter/updates/latest.json"
            echo ""
            echo "All running mdwriter installs will see this version on their next update check."
          } >> "$GITHUB_STEP_SUMMARY"

  # ──────────────────────────────────────────────────────────────
  # Job 4: If anything above failed, undo the tag we created so the
  # user can re-run after fixing the issue. Without this, a failed
  # release leaves a dangling tag that blocks re-running the workflow.
  # ──────────────────────────────────────────────────────────────
  cleanup-on-failure:
    name: Roll back tag on failure
    needs: [tag, build, publish-manifest]
    if: failure() && needs.tag.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Delete tag via GitHub API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.tag.outputs.tag }}
        run: |
          set -euo pipefail
          gh api -X DELETE "/repos/${GITHUB_REPOSITORY}/git/refs/tags/${TAG}" || true
          {
            echo "### Release failed; tag rolled back"
            echo ""
            echo "Tag \`${TAG}\` was deleted because a downstream job failed. Investigate the failed job, then re-run this workflow."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Delete the (likely-empty) draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "${{ needs.tag.outputs.tag }}" --yes || true
