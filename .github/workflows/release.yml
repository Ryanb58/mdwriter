name: Release

on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: 'Release notes (markdown). Leave blank for autogenerated.'
        required: false
        default: ''

env:
  NODE_OPTIONS: --max-old-space-size=4096

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ──────────────────────────────────────────────────────────────
  # Job 1: Create the release tag from today's date + current short SHA.
  # Tag form: vYYYY-MM-DD.<short-sha>; version YYYY.M.D (no leading zeros).
  # ──────────────────────────────────────────────────────────────
  tag:
    name: Create release tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.compute.outputs.tag }}
      version: ${{ steps.compute.outputs.version }}
      sha: ${{ steps.compute.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute tag and version
        id: compute
        shell: bash
        run: |
          set -euo pipefail
          SHORT_SHA=$(git rev-parse --short HEAD)
          DATE=$(date -u +%Y-%m-%d)
          TAG="v${DATE}.${SHORT_SHA}"
          VERSION=$(echo "$DATE" | awk -F- '{printf "%d.%d.%d", $1, $2, $3}')

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "::error::Tag $TAG already exists. If a release was already cut today from this commit, push a new commit before running again."
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          {
            echo "### Cutting release"
            echo ""
            echo "- Tag: \`$TAG\`"
            echo "- Version: \`$VERSION\`"
            echo "- Source SHA: \`$SHORT_SHA\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Push tag
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.compute.outputs.tag }}"
          git push origin "${{ steps.compute.outputs.tag }}"

  # ──────────────────────────────────────────────────────────────
  # Job 2: Build per-platform bundles in parallel and upload them
  # to a draft GitHub release.
  # ──────────────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.os }} ${{ matrix.arch }})
    needs: tag
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            arch: aarch64
            target: aarch64-apple-darwin
            bundles: app,dmg,updater
          - os: macos-15
            arch: x86_64
            target: x86_64-apple-darwin
            bundles: app,dmg,updater
          - os: windows-latest
            arch: x86_64
            target: x86_64-pc-windows-msvc
            # Skip MSI — MSI's version major is limited to u8 (0-255), and
            # our YYYY.M.D versioning would always blow that out. NSIS has
            # no such limit and is the .exe form the updater manifest
            # already references.
            bundles: nsis,updater
          - os: ubuntu-latest
            arch: x86_64
            target: x86_64-unknown-linux-gnu
            bundles: deb,rpm,appimage,updater
    steps:
      - name: Checkout the tagged commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.tag.outputs.tag }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.target }}-

      - name: Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            patchelf

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Stamp version into manifests
        shell: bash
        run: |
          VERSION="${{ needs.tag.outputs.version }}"
          # tauri.conf.json
          node -e "const fs=require('fs');const p='src-tauri/tauri.conf.json';const j=JSON.parse(fs.readFileSync(p));j.version='${VERSION}';fs.writeFileSync(p,JSON.stringify(j,null,2)+'\n');"
          # Cargo.toml
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            sed -i '' "s/^version = \".*\"/version = \"${VERSION}\"/" src-tauri/Cargo.toml
          else
            sed -i "s/^version = \".*\"/version = \"${VERSION}\"/" src-tauri/Cargo.toml
          fi
          # package.json
          node -e "const fs=require('fs');const p='package.json';const j=JSON.parse(fs.readFileSync(p));j.version='${VERSION}';fs.writeFileSync(p,JSON.stringify(j,null,2)+'\n');"

      - name: Build with tauri-action
        uses: tauri-apps/tauri-action@v0
        env:
          # Required for tauri-action to upload bundles to the GitHub release.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GitHub doesn't allow empty-string secrets, so the password secret
          # may not exist. Tauri treats empty/missing as "key has no password."
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD || '' }}
          # Ad-hoc codesign on macOS so future auto-updates don't re-trigger
          # Gatekeeper. "-" is the ad-hoc identity; no Apple Developer ID needed.
          APPLE_SIGNING_IDENTITY: ${{ runner.os == 'macOS' && '-' || '' }}
        with:
          tagName: ${{ needs.tag.outputs.tag }}
          releaseName: 'mdwriter ${{ needs.tag.outputs.version }} (${{ needs.tag.outputs.tag }})'
          releaseBody: |
            ${{ inputs.release_notes }}

            ---

            **macOS (unsigned):** right-click the app and choose Open the first time.
            **Windows (unsigned):** click "More info → Run anyway" on SmartScreen.
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      - name: Upload signature artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sigs-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.sig
          if-no-files-found: warn

  # ──────────────────────────────────────────────────────────────
  # Job 3: Generate latest.json from the .sig files and publish it
  # to the gh-pages branch under /updates/. Only runs after every
  # platform build succeeds — so a partial release never silently
  # rolls users to a half-broken update.
  # Then flips the GitHub release from draft → published, which is
  # what makes the asset URLs in latest.json resolve.
  # ──────────────────────────────────────────────────────────────
  publish-manifest:
    name: Publish update manifest and release
    needs: [tag, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.tag.outputs.tag }}

      - name: Download all signature artifacts
        uses: actions/download-artifact@v4
        with:
          path: sigs

      - name: Generate latest.json
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.tag.outputs.version }}"
          TAG="${{ needs.tag.outputs.tag }}"
          BASE="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}"
          PUBDATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          read_sig() {
            local pattern="$1"
            local file
            file=$(find sigs -type f -name "$pattern" | head -1 || true)
            if [[ -z "$file" ]]; then echo ""; return; fi
            cat "$file"
          }

          MAC_ARM_SIG=$(read_sig "*aarch64*.app.tar.gz.sig")
          MAC_X64_SIG=$(read_sig "*x86_64*.app.tar.gz.sig")
          WIN_SIG=$(read_sig "*x64-setup.exe.sig")

          mkdir -p out
          {
            echo '{'
            echo "  \"version\": \"${VERSION}\","
            echo "  \"notes\": \"See https://github.com/${GITHUB_REPOSITORY}/releases/tag/${TAG} for the full changelog.\","
            echo "  \"pub_date\": \"${PUBDATE}\","
            echo '  "platforms": {'
            FIRST=1
            emit() {
              local key="$1" sig="$2" url="$3"
              if [[ -z "$sig" ]]; then return; fi
              if [[ $FIRST -eq 0 ]]; then echo ','; fi
              FIRST=0
              printf '    "%s": {\n      "signature": %s,\n      "url": "%s"\n    }' "$key" "$(jq -Rs <<< "$sig")" "$url"
            }
            emit "darwin-aarch64" "$MAC_ARM_SIG" "${BASE}/mdwriter_${VERSION}_aarch64.app.tar.gz"
            emit "darwin-x86_64"  "$MAC_X64_SIG" "${BASE}/mdwriter_${VERSION}_x86_64.app.tar.gz"
            emit "windows-x86_64" "$WIN_SIG"     "${BASE}/mdwriter_${VERSION}_x64-setup.exe"
            echo
            echo '  }'
            echo '}'
          } > out/latest.json
          cat out/latest.json

      # Promote the draft release first, so its asset URLs resolve
      # before installed apps fetch latest.json and try to download.
      - name: Promote draft release to published
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ needs.tag.outputs.tag }}" --draft=false

      - name: Publish manifest to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: out
          destination_dir: updates
          keep_files: true
          commit_message: 'Publish mdwriter ${{ needs.tag.outputs.version }} manifest'

      - name: Summary
        run: |
          {
            echo "### Release published"
            echo ""
            echo "- GitHub Release: https://github.com/${GITHUB_REPOSITORY}/releases/tag/${{ needs.tag.outputs.tag }}"
            echo "- Update manifest: https://ryanb58.github.io/mdwriter/updates/latest.json"
            echo ""
            echo "All running mdwriter installs will see this version on their next update check."
          } >> "$GITHUB_STEP_SUMMARY"

  # ──────────────────────────────────────────────────────────────
  # Job 4: If anything above failed, undo the tag we created so the
  # user can re-run after fixing the issue. Without this, a failed
  # release leaves a dangling tag that blocks re-running the workflow.
  # ──────────────────────────────────────────────────────────────
  cleanup-on-failure:
    name: Roll back tag on failure
    needs: [tag, build, publish-manifest]
    if: failure() && needs.tag.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Delete tag locally and remotely
        run: |
          set -euo pipefail
          TAG="${{ needs.tag.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git push --delete origin "$TAG" || true
          {
            echo "### Release failed; tag rolled back"
            echo ""
            echo "Tag \`$TAG\` was deleted because a downstream job failed. Investigate the failed job, then re-run this workflow."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Delete the (likely-empty) draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "${{ needs.tag.outputs.tag }}" --yes || true
